base_currency: EUR

# Zones live basées sur ratio = (loss_positive / VaR)
# - GREEN : marge confortable
# - ORANGE : proche du VaR
# - RED : dépassement du VaR
live_zones:
  green_max_ratio: 0.80
  orange_max_ratio: 1.00

# Limites “hard” (en EUR) par modèle
model_limits_eur:
  hist:  { var: 200.0, es: 260.0 }
  param: { var: 220.0, es: 280.0 }
  mc:    { var: 220.0, es: 280.0 }
  ewma:  { var: 220.0, es: 280.0 }
  garch: { var: 220.0, es: 280.0 }
  fhs:   { var: 220.0, es: 280.0 }

# Backtesting “traffic light” (standard 99% sur 250 jours)
# 0-4 : GREEN, 5-9 : YELLOW, >=10 : RED
backtest_traffic_light_99_250:
  green_max: 4
  yellow_max: 9

risk_budget:
  utilisation_warn: 0.85
  utilisation_breach: 1.00
  target_buffer: 0.95
  position_tolerance: 0.05
  preferred_model: "best_validation"
  symbol_weights:
    EURUSD: 0.50
    USDJPY: 0.50

capital_management:
  reserve_ratio: 0.10
  rebalance_min_gap: 10.0
  preferred_model: "best_validation"

risk_decision:
  decision_mode: "advisory"
  reference_model: "best_validation"
  warn_threshold: 0.85
  breach_threshold: 1.00
  min_fill_ratio: 0.25
  allow_risk_reducing_override: true
