version: 1
disable_existing_loggers: false

formatters:
  standard:
    format: "%(asctime)s | %(levelname)s | %(name)s | %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"

handlers:
  console:
    class: logging.StreamHandler
    level: INFO
    formatter: standard
    stream: ext://sys.stdout

  file:
    class: logging.handlers.RotatingFileHandler
    level: DEBUG
    formatter: standard
    filename: reports/logs/var_project.log
    maxBytes: 1048576     # 1MB
    backupCount: 5
    encoding: utf-8

root:
  level: INFO
  handlers: [console, file]

loggers:
  var_project:
    level: DEBUG
    handlers: [console, file]
    propagate: false
